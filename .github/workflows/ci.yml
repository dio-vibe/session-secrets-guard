name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show system Ruby
        run: /usr/bin/ruby --version

      - name: Compile scripts
        run: /usr/bin/ruby -c scripts/*.rb tests/test_secret_guard.rb

      - name: Check shell scripts
        run: bash -n install*.sh uninstall*.sh bootstrap*.sh scripts/run_with_secrets.sh

      - name: Run unit tests
        run: /usr/bin/ruby tests/test_secret_guard.rb
